name: Scraper — Sodré Santoro

on:
  schedule:
    # 08:00 BRT (11:00 UTC) nos dias úteis; adicionar sáb/dom se o Sodré publicar nos fins de semana
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Salvar screenshot de debug como artefato'
        type: boolean
        default: false

jobs:
  scrape:
    name: Raspar lotes de motos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scrapers/package-lock.json

      - name: Instalar dependências
        working-directory: scrapers
        run: npm install

      - name: Instalar Chromium (Playwright)
        working-directory: scrapers
        run: npx playwright install chromium --with-deps

      - name: Executar scraper
        working-directory: scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node sodre.js

      # Só sobe o screenshot se o workflow foi disparado manualmente com debug=true
      # ou se o passo anterior falhou (útil para diagnosticar bloqueios do CDN)
      - name: Upload artefato de debug
        if: failure() || (github.event_name == 'workflow_dispatch' && inputs.debug)
        uses: actions/upload-artifact@v4
        with:
          name: sodre-debug-${{ github.run_id }}
          path: scrapers/sodre-*.png
          retention-days: 3
          if-no-files-found: ignore
