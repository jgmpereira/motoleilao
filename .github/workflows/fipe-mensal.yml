name: Atualização FIPE Mensal

on:
  schedule:
    - cron: '0 10 1 * *'  # Dia 1 de cada mês às 7h BRT (10h UTC)
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    name: Atualizar preços FIPE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Atualizar FIPE
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/atualizar-fipe-mensal.js
