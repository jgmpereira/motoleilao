name: Scraper — Freitas Leiloeiro

on:
  schedule:
    # 08:30 BRT (11:30 UTC) todos os dias
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Raspar lotes de motos
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scrapers/package-lock.json

      - name: Instalar dependências
        working-directory: scrapers
        run: npm install

      - name: Executar scraper
        working-directory: scrapers
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node freitas.js
