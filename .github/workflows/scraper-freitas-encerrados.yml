name: Scraper — Freitas Encerrados

on:
  schedule:
    - cron: '0 18 * * *'    # 15h BRT (18h UTC) — captura intermediária (página ainda no ar)
    - cron: '30 23 * * *'   # 20h30 BRT (23h30 UTC) — captura final (resultados resolvidos)
  workflow_dispatch:

jobs:
  raspar:
    runs-on: ubuntu-latest
    name: Atualizar arrematados Freitas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar scraper
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scrapers/freitas-encerrados.js
